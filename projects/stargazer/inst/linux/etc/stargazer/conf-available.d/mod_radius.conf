# Enable the interaction module for RADIUS "mod_radius.so"
<Module radius>
    # RADIUS shared secret
    # Parameter: required
    # Values: any
    Secret = sec

    # Path to RADIUS dictionaries file
    # Parameter: optional
    # Values: file path
    # Default: /usr/share/freeradius/dictionary
    # Dictionaries = /usr/share/freeradius/dictionary

    # RADIUS port number
    # Parameter: optional
    # Value: 1 ... 65535
    # Default: 1812
    # Port = 1812

    <auth>
        send = "User-Name = login, Framed-IP-Address = currip, Service-Type = \'Framed-User\', Callback-Number = \'987654abc\'"
        match = "Calling-Station-Id = userdata0"
    </auth>

    <autz>
        send = "Framed-IP-Address = currip, Service-Type = \'Login-User\'"
        match = "User-Name = login, User-Password = password"
    </autz>
</Module>
